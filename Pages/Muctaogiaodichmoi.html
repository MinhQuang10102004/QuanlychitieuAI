@page
@model MuctaogiaodichmoiModel

<div class="container">
    <h2>Tạo giao dịch mới</h2>
    <form method="post">
        <div class="form-group">
            <label for="TaiKhoanId">Chọn tài khoản</label>
            <select class="form-control" id="TaiKhoanId" name="TaiKhoanId">
                @foreach (var tk in Model.TaiKhoanList)
                {
                    <option value="@tk.Id">@tk.TenTaiKhoan</option>
                }
            </select>
        </div>

        <div class="form-group">
            <label for="SoTien">Số tiền</label>
            <input type="number" class="form-control" id="SoTien" name="SoTien" step="0.01" required />
        </div>

        <div class="form-group">
            <label for="Loai">Loại giao dịch</label>
            <select class="form-control" id="Loai" name="Loai">
                <option value="Thu">Thu</option>
                <option value="Chi">Chi</option>
            </select>
        </div>

        <div class="form-group">
            <label for="GhiChu">Ghi chú</label>
            <textarea class="form-control" id="GhiChu" name="GhiChu"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Tạo giao dịch</button>
    </form>
</div>
