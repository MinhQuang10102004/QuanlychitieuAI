<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Cleanup</title>
</head>
<body>
  <h2>Dev AI Cleanup</h2>
  <p>This page will POST to <code>/ai/cleanup-errors</code>.</p>
  <form id="f" method="post" action="/ai/cleanup-errors">
    <button type="submit">Run cleanup</button>
  </form>
  <script>
    // Auto-submit when loaded
    setTimeout(()=>{ document.getElementById('f').submit(); }, 300);
  </script>
</body>
</html>
